  name: Sync to Public                                                                                                                                                                       
   
  on:                                                                                                                                                                                        
    push:                                                                                                                      
      branches: [main]                
                                                                                                                                                                                             
  jobs:
    sync:                                                                                                                                                                                    
      runs-on: ubuntu-latest                                                                                                   
                                      
      steps:
        - uses: actions/checkout@v4

        - name: Remove private files
          run: |
            rm -rf docs/dev/
            rm -f CLAUDE.md                                                                                                                                                                  
   
        - name: Push to public repo                                                                                                                                                          
          env:                                                                                                                 
            TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          run: |                                                                                                                                                                             
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${TOKEN}" https://api.github.com/repos/lattapon-aek/agents-orchestrator-management)
            echo "API status: $STATUS"                                                                                                                                                       
            git config user.name "github-actions[bot]"                                                                         
            git config user.email "github-actions[bot]@users.noreply.github.com"                                                                                                             
            git add -A                                                                                                         
            git diff --cached --quiet || git commit -m "sync: ${{ github.sha }}"                                                                                                             
            git remote add public https://x-access-token:${TOKEN}@github.com/lattapon-aek/agents-orchestrator-management.git
            git push public main --force 
