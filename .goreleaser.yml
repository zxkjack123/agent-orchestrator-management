version: 2

project_name: aom

before:
  hooks:
    - go mod tidy

builds:
  - id: aom
    main: ./cmd/aom/main.go
    binary: aom
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/lattapon-aek/agent-orchestrator-management/internal/cli.Version={{.Version}}
      - -X github.com/lattapon-aek/agent-orchestrator-management/internal/cli.Commit={{.Commit}}
      - -X github.com/lattapon-aek/agent-orchestrator-management/internal/cli.BuiltAt={{.Date}}
      - -X github.com/lattapon-aek/agent-orchestrator-management/internal/cli.GoVersion={{.Env.GOVERSION}}

archives:
  - id: aom
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md

checksum:
  name_template: "checksums.txt"

brews:
  - name: aom
    repository:
      owner: lattapon-aek
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    folder: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update aom to {{ .Tag }}"
    homepage: "https://github.com/lattapon-aek/agent-orchestrator-management"
    description: "Project-level control plane for managing multiple CLI-based AI agents as a coordinated team"
    license: MIT
    install: |
      bin.install "aom"
    test: |
      system "#{bin}/aom", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: lattapon-aek
    name: agent-orchestrator-management
  draft: false
  prerelease: auto
  name_template: "AOM {{.Version}}"
